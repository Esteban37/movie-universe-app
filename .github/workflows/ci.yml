name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare environment file
        run: cp .env.development.example .env

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (Freezed / json_serializable)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Dart analyze
        run: dart analyze --fatal-warnings

      - name: Dependency validator
        run: dart run dependency_validator

      - name: Unit and widget tests
        run: flutter test

      - name: Enable Linux desktop for integration tests
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config xvfb
          flutter config --enable-linux-desktop
          flutter create --platforms=linux --no-pub .

      - name: Integration tests
        run: xvfb-run -a flutter test integration_test -d linux

      - name: OpenSpec doctor (when CLI and specs are present)
        run: |
          if [ -d openspec/specs ] && command -v openspec >/dev/null 2>&1; then
            openspec doctor || true
          else
            echo "Skipping OpenSpec (specs directory or CLI not available)."
          fi
